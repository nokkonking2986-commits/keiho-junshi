<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e8f0f7;
    --card-bg: #ffffff;
    --card-border: #d0dce8;
    --cyan: #0077b6;
    --white: #1a2a3a;
    --gray: #4a6080;
    --a-color: #00897b;
    --b-color: #e64a19;
    --section-line-a: #00897b;
    --section-line-b: #e64a19;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(135deg, transparent, transparent 60px, rgba(0,119,182,0.04) 60px, rgba(0,119,182,0.04) 61px);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%; left: -20%;
    width: 140%; height: 200%;
    background: radial-gradient(ellipse 60% 40% at 50% 30%, rgba(0,119,182,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .river-icon { display: inline-block; margin-bottom: 12px; }
  .river-icon svg { width: 48px; height: 48px; filter: drop-shadow(0 0 12px var(--cyan)); }

  h1 { font-size: 2rem; font-weight: 900; color: #0d1f33; letter-spacing: 0.12em; }
  .subtitle { margin-top: 8px; font-size: 0.78rem; color: var(--gray); letter-spacing: 0.15em; }

  .section-label {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px; margin-top: 28px;
  }
  .section-label:first-of-type { margin-top: 0; }

  .course-badge {
    font-size: 0.7rem; font-weight: 900; letter-spacing: 0.12em;
    padding: 3px 10px; border-radius: 20px;
  }
  .badge-a { background: var(--a-color); color: #003d2e; }
  .badge-b { background: var(--b-color); color: #3e1a00; }

  .section-line { flex: 1; height: 1px; opacity: 0.25; }
  .line-a { background: var(--a-color); }
  .line-b { background: var(--b-color); }

  .route-btn {
    display: flex; align-items: center;
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    text-decoration: none;
    color: var(--white);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .route-btn::before {
    content: ''; position: absolute; inset: 0; opacity: 0;
    transition: opacity 0.25s ease; border-radius: 16px;
  }
  .route-btn.course-a::before { background: linear-gradient(135deg, rgba(0,196,160,0.12) 0%, transparent 60%); }
  .route-btn.course-b::before { background: linear-gradient(135deg, rgba(255,112,67,0.12) 0%, transparent 60%); }

  .route-btn:hover { transform: translateX(4px); border-color: #b0c4d8; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .route-btn.course-a:hover { border-color: rgba(0,137,123,0.5); box-shadow: 0 4px 24px rgba(0,137,123,0.15); }
  .route-btn.course-b:hover { border-color: rgba(230,74,25,0.5); box-shadow: 0 4px 24px rgba(230,74,25,0.15); }
  .route-btn:hover::before { opacity: 1; }
  .route-btn:active { transform: translateX(2px) scale(0.99); }

  .btn-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-right: 16px; font-size: 1.1rem;
  }
  .icon-a { background: rgba(0,196,160,0.15); }
  .icon-b { background: rgba(255,112,67,0.15); }

  .btn-text { flex: 1; text-align: left; }
  .btn-title { font-size: 0.95rem; font-weight: 700; line-height: 1.3; color: #0d1f33; }
  .btn-route { display: flex; align-items: center; gap: 6px; margin-top: 5px; font-size: 0.75rem; color: var(--gray); }

  .btn-arrow { color: #a0b4c8; font-size: 1rem; flex-shrink: 0; margin-left: 8px; transition: transform 0.25s ease; }
  .route-btn:hover .btn-arrow { transform: translateX(3px); color: #0d1f33; }

  footer {
    text-align: center; margin-top: 36px;
    font-size: 0.7rem; color: #7a90a8; letter-spacing: 0.08em;
    animation: fadeUp 0.6s ease 0.5s both;
  }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }

  @media (max-width: 400px) {
    h1 { font-size: 1.6rem; }
    .route-btn { padding: 15px 16px; }
    .btn-title { font-size: 0.88rem; }
  }
</style>
</head>
